# Nginx Cache Configuration for ET: Legacy Stats

load_module /etc/nginx/modules/ngx_http_cache_purge_module.so;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Cache zone for match pages (disk-based, 100MB keys, 1GB max size)
    proxy_cache_path /var/cache/nginx/match_cache
        levels=1:2
        keys_zone=match_cache:100m
        max_size=1g
        inactive=720h
        use_temp_path=off;

    # Upstream Astro server
    upstream astro_backend {
        server ${ASTRO_UPSTREAM};
    }

    # Upstream for analytics
    upstream analytics_backend {
        server app.lythia.dev:443;
    }

    # Log format
    log_format cache_log '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '$upstream_cache_status';

    access_log /var/log/nginx/access.log cache_log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name _;

        # ============================================================
        # PURGE API
        # ============================================================
        location ~ ^/cache/purge/([0-9a-fA-F-]+)$ {
            set $auth_ok 0;
            if ($remote_addr = 127.0.0.1) {
                set $auth_ok 1;
            }
            if ($http_authorization = "Bearer ${CACHE_PURGE_TOKEN}") {
                set $auth_ok 1;
            }
            if ($auth_ok = 0) {
                return 403;
            }

            proxy_cache_purge match_cache "match/$1";

            add_header Content-Type application/json;
            return 200 '{"success":true}';
        }

        location = /cache/purge/root {
            set $auth_ok 0;
            if ($remote_addr = 127.0.0.1) {
                set $auth_ok 1;
            }
            if ($http_authorization = "Bearer ${CACHE_PURGE_TOKEN}") {
                set $auth_ok 1;
            }
            if ($auth_ok = 0) {
                return 403;
            }

            proxy_cache_purge match_cache "root";

            add_header Content-Type application/json;
            return 200 '{"success":true}';
        }

        # ============================================================
        # ANALYTICS REWRITES
        # ============================================================
        location = /anal/a/script.js {
            proxy_pass https://analytics_backend/collect/analytics/script.js;
            proxy_ssl_server_name on;
            proxy_set_header Host app.lythia.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /anal/m/script.js {
            proxy_pass https://analytics_backend/collect/metrics/script.js;
            proxy_ssl_server_name on;
            proxy_set_header Host app.lythia.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /anal/a {
            proxy_pass https://analytics_backend/collect/analytics/report;
            proxy_ssl_server_name on;
            proxy_set_header Host app.lythia.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /anal/m {
            proxy_pass https://analytics_backend/collect/metrics/report;
            proxy_ssl_server_name on;
            proxy_set_header Host app.lythia.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # STATIC ASSETS - Immutable caching
        # ============================================================
        location ~* \.(js|css|woff|woff2|svg|avif|png|jpg|jpeg|gif|ico)$ {
            proxy_pass http://astro_backend;
            proxy_cache match_cache;
            proxy_cache_valid 200 8760h;
            proxy_cache_use_stale error timeout invalid_header updating;

            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_cache_valid 404 1m;
            proxy_cache_valid 500 502 503 504 0;
        }

        # ============================================================
        # ROOT PAGE
        # ============================================================
        location = / {
            proxy_pass http://astro_backend;
            proxy_cache match_cache;
            proxy_cache_key "root";
            proxy_cache_valid 200 720h;
            proxy_cache_use_stale error timeout invalid_header updating;

            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, s-maxage=2592000, max-age=0, must-revalidate" always;
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # MATCH PAGES
        # ============================================================
        location ~ ^/matches/([0-9a-fA-F-]+)$ {
            proxy_pass http://astro_backend;
            proxy_cache match_cache;
            proxy_cache_key "match/$1";
            proxy_cache_valid 200 720h;
            proxy_cache_use_stale error timeout invalid_header updating;

            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, s-maxage=2592000, max-age=0, must-revalidate" always;
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Handle match pages WITH query params (same cache key)
        location ~ ^/matches/([0-9a-fA-F-]+)\? {
            proxy_pass http://astro_backend;
            proxy_cache match_cache;
            proxy_cache_key "match/$1";
            proxy_cache_valid 200 720h;
            proxy_cache_use_stale error timeout invalid_header updating;

            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, s-maxage=2592000, max-age=0, must-revalidate" always;
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # SEARCH & API - No caching
        # ============================================================
        location ~ ^/(search|api)/ {
            proxy_pass http://astro_backend;
            proxy_cache off;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # FALLBACK
        # ============================================================
        location / {
            proxy_pass http://astro_backend;
            proxy_cache match_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_use_stale error timeout invalid_header updating;

            add_header X-Cache-Status $upstream_cache_status always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
