server {
    listen 8080;
    server_name _;

    # Analytics proxy - MUST come before regex locations
    # ^~ modifier ensures these take precedence over regex locations
    location ^~ /anal/a/script.js {
        proxy_pass https://app.lythia.dev/collect/analytics/script.js;
        proxy_set_header Host app.lythia.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location ^~ /anal/m/script.js {
        proxy_pass https://app.lythia.dev/collect/metrics/script.js;
        proxy_set_header Host app.lythia.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location ^~ /anal/a {
        proxy_pass https://app.lythia.dev/collect/analytics/report;
        proxy_set_header Host app.lythia.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location ^~ /anal/m {
        proxy_pass https://app.lythia.dev/collect/metrics/report;
        proxy_set_header Host app.lythia.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Static assets - cache with immutable headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|avif|webm)$ {
        proxy_pass http://etlegacy-astro-upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # All other requests - proxy to Astro
    location / {
        proxy_pass http://etlegacy-astro-upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for dev server
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
